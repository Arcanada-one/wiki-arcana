name: Deploy

# Prod API deploy to arcana-prod is OPERATOR-GATED (manual dispatch only).
# push->main runs CI (ci.yml) but MUST NOT auto-deploy the API: the first prod
# rollout requires a verified wiki_arcana DB backup + the schema v0 migration
# applied out-of-band. Flip to a push trigger only after the operator confirms
# that gate is satisfied.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-wiki-arcana
  cancel-in-progress: false

jobs:
  verify-release:
    name: verify-release
    runs-on: [self-hosted, linux, arcana-prod]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.10.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  deploy:
    name: deploy-arcana-prod
    needs: [verify-release]
    environment: production
    runs-on: [self-hosted, linux, arcana-prod]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Resolve Ops Bot key from Vault with network-only fallback
        id: ops-key
        env:
          OPSBOT_API_KEY_FALLBACK: ${{ secrets.OPSBOT_API_KEY }}
        run: |
          set -euo pipefail
          key="$(scripts/ci-resolve-ops-key.sh)"
          echo "::add-mask::$key"
          echo "OPSBOT_KEY=$key" >> "$GITHUB_ENV"
      - name: Pre-deploy host checks
        uses: Arcanada-one/datarim/.github/actions/preflight-check@0ba3bd641a50f95dae110fa3f1d60d2ae062b723 # 2.57.0 main
        with:
          target-host: arcana-prod
          service-name: wiki-arcana
          extra-checks: |
            vault
            tailscale
            time-skew
            docker-pressure
            ram-swap
            loadavg
            health-pre-probe
          ops-bot-emit: 'true'
          ops-bot-url: https://ops.arcanada.ai/events
          ops-bot-key: ${{ env.OPSBOT_KEY }}
          severity-overrides: ${{ vars.PREFLIGHT_ARCANA_PROD_OVERRIDES_JSON }}
      - name: Deploy immutable commit to local production host
        run: scripts/deploy-local.sh "${GITHUB_SHA}"
      - name: Post-deploy health
        run: |
          set -euo pipefail
          curl -fsS --max-time 15 http://127.0.0.1:4110/health
          curl -fsS --max-time 15 http://127.0.0.1:4110/version
      - name: Emit deduplicated fatal evidence
        if: failure() && env.OPSBOT_KEY != ''
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          payload="$(jq -cn --arg run "$RUN_URL" '{category:"fatal",agent:"wiki-arcana",title:"Wiki Arcana deploy failed",body:("Run: " + $run),dedup_key:"wiki-arcana-deploy-failed"}')"
          printf '%s' "$payload" | curl -fsS --max-time 10 -X POST https://ops.arcanada.ai/events \
            -H "Authorization: Bearer $OPSBOT_KEY" -H 'Content-Type: application/json' --data-binary @-
